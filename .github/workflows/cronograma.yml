name: Ejecutar Agente Inmobiliario

on:
  schedule:
    # Corre todos los días a las 11:00 AM UTC (08:00 AM hora de Argentina)
    - cron: '0 11 * * *'
  workflow_dispatch: # Esto te agrega un botón para poder ejecutarlo "a demanda" cuando quieras

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar librerías
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar el agente
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      run: python agente_inmobiliario.py

    - name: Subir el reporte generado como resultado
      uses: actions/upload-artifact@v4
      with:
        name: reporte-inmobiliario-html
        path: index.html